<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil Joueur — USDI FC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css" crossorigin="anonymous" />
  <style>
    .profile-hero {
      background: var(--black-mid);
      border-bottom: 3px solid var(--gold);
      padding: 2.5rem 2rem;
    }
    .profile-hero-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: flex-start; gap: 2rem;
    }
    .profile-avatar {
      width: 160px; height: 190px;
      background: repeating-linear-gradient(45deg,#1a1a1a 0,#1a1a1a 6px,#111 6px,#111 12px);
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; flex-shrink: 0;
      border: 2px solid var(--gold);
      overflow: hidden;
    }
    .profile-num {
      font-family: var(--font-display);
      font-size: 5rem; color: var(--gold); line-height: 1;
      opacity: 0.15; position: absolute; right: 2rem; top: 1.5rem;
    }
    .profile-position-tag {
      font-size: 0.65rem; color: var(--gold); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 0.4rem;
    }
    .profile-name {
      font-family: var(--font-display);
      font-size: 2.5rem; color: var(--white); letter-spacing: 0.08em;
      line-height: 1; margin-bottom: 0.6rem;
    }
    .profile-meta {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .profile-meta-item { font-size: 0.75rem; color: var(--gray-3); }
    .profile-meta-item strong { color: var(--white); }
    .profile-body {
      max-width: 1000px; margin: 2rem auto;
      padding: 0 2rem;
      display: grid; grid-template-columns: 1fr 280px; gap: 2rem;
    }
    @media(max-width:700px){ .profile-body{grid-template-columns:1fr;} }
    .stats-section h2 {
      font-family: var(--font-display);
      font-size: 1.2rem; color: var(--white); letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr));
      gap: 1px; background: var(--dark); margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--black-mid); padding: 1rem;
      text-align: center;
    }
    .sv {
      font-family: var(--font-display);
      font-size: 2.5rem; color: var(--gold); display: block; line-height: 1;
    }
    .sl {
      font-size: 0.6rem; color: var(--gray-3);
      text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.25rem;
    }
    .bio-text { font-size: 0.85rem; color: var(--gray-4); line-height: 1.8; }
    .sidebar-card {
      background: var(--black-mid);
      border-top: 3px solid var(--gold);
    }
    .sidebar-card-head {
      font-family: var(--font-display);
      font-size: 0.85rem; color: var(--gold); letter-spacing: 0.15em;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--dark);
    }
    .sidebar-card-body { padding: 0.5rem 0; }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 0.45rem 1rem;
      border-bottom: 1px solid var(--dark);
      font-size: 0.75rem;
    }
    .ik { color: var(--gray-3); }
    .iv { color: var(--white); font-weight: 600; }
  </style>
</head>
<body>

<!-- ANNOUNCEMENT BAR -->
<div class="announce-bar">
  <div data-i18n-html="announce">🔔 Détection de talents 2026 — <a href="FC USDI Desktop.html#club">Inscriptions ouvertes</a></div>
  <div class="announce-socials">
    <a href="https://www.instagram.com/unionsportivedeladiaspora/" target="_blank" rel="noopener" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
    <a href="https://www.facebook.com/unionsportivedeladiaspora" target="_blank" rel="noopener" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
    <a href="https://x.com/fcusdi" target="_blank" rel="noopener" title="Twitter / X"><i class="fa-brands fa-x-twitter"></i></a>
    <a href="https://www.youtube.com/channel/UCHBA-fiMs9pzXdzV5kR6Mww" target="_blank" rel="noopener" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
    <a href="https://www.flickr.com/photos/202598756@N03/albums/" target="_blank" rel="noopener" title="Flickr"><i class="fa-brands fa-flickr"></i></a>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="nav-logo" href="FC USDI Desktop.html">
    <img src="img/logo.png" alt="USDI FC" class="nav-logo-img" />
    <span class="nav-logo-text">USDI FC</span>
  </a>
  <ul class="nav-links">
    <li><a href="FC USDI Desktop.html" data-i18n="nav.home">Accueil</a></li>
    <li><a href="FC USDI Desktop.html#news" data-i18n="nav.news">Actualités</a></li>
    <li><a href="teams.html" data-i18n="nav.team">Équipe</a></li>
    <li><a href="players.html" class="active" data-i18n="nav.players">Joueurs</a></li>
    <li><a href="FC USDI Desktop.html#fixtures" data-i18n="nav.results">Résultats</a></li>
    <li><a href="FC USDI Desktop.html#club" data-i18n="nav.club">Club</a></li>
  </ul>
  <div class="nav-actions">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">
        FR <span class="fi fi-fr"></span>
      </button>
      <span class="lang-sep"></span>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">
        EN <span class="fi fi-gb"></span>
      </button>
    </div>
    <a href="FC USDI Desktop.html#club" class="btn-nav btn-nav-primary" data-i18n="nav.join">Rejoindre</a>
  </div>
</nav>

<div id="profile-hero-wrap"></div>
<div class="gold-line"></div>
<div id="profile-body-wrap"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="section-wrap">
    <div class="footer-bottom">
      <span>© 2026 USDI FC — Union Sportive de la Diaspora. Tous droits réservés.</span>
      <div style="display:flex;gap:1.5rem;"><a href="#">Mentions légales</a><a href="#">Confidentialité</a></div>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/i18n.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const player = PLAYERS.find(p => p.id === parseInt(params.get('id')));

  if (!player) {
    document.getElementById('profile-hero-wrap').innerHTML =
      '<div style="padding:4rem 2rem;text-align:center;color:var(--gray-3)">Joueur introuvable. <a href="players.html" style="color:var(--gold)">Retour aux joueurs</a></div>';
  } else {
    document.title = player.name + ' — USDI FC';

    document.getElementById('profile-hero-wrap').innerHTML = `
      <div class="profile-hero">
        <div class="profile-hero-inner" style="position:relative">
          <div class="profile-avatar" style="${player.photo
            ? `background:url('${player.photo}') center/cover no-repeat;font-size:0`
            : ''}">${player.photo ? '' : player.emoji}</div>
          <div>
            <a href="players.html" style="font-size:0.72rem;color:var(--gray-3);display:inline-flex;align-items:center;gap:0.3rem;margin-bottom:0.5rem;transition:color .2s" onmouseover="this.style.color='#FFD700'" onmouseout="this.style.color='var(--gray-3)'">← Retour aux joueurs</a>
            <div class="profile-position-tag">
              <span class="player-pos-tag pos-${player.position}" style="margin-right:.5rem">${player.position}</span>${player.positionFull} · ${player.team}
            </div>
            <div class="profile-name">${player.name}</div>
            <div class="profile-meta">
              <div class="profile-meta-item">🌍 <strong>${player.nationality}</strong></div>
              <div class="profile-meta-item">Âge <strong>${player.age}</strong></div>
              <div class="profile-meta-item">Taille <strong>${player.height}</strong></div>
              <div class="profile-meta-item">Pied <strong>${player.foot}</strong></div>
            </div>
          </div>
          <div class="profile-num">#${player.number}</div>
        </div>
      </div>
    `;

    const s = player.stats;
    const extraStats = [
      s.cleanSheets !== undefined ? `<div class="stat-card"><span class="sv">${s.cleanSheets}</span><div class="sl">Clean Sheets</div></div>` : '',
      s.saves !== undefined ? `<div class="stat-card"><span class="sv">${s.saves}</span><div class="sl">Arrêts</div></div>` : '',
      s.tackles !== undefined ? `<div class="stat-card"><span class="sv">${s.tackles}</span><div class="sl">Tacles</div></div>` : '',
      s.keyPasses !== undefined ? `<div class="stat-card"><span class="sv">${s.keyPasses}</span><div class="sl">Passes clés</div></div>` : '',
    ].join('');

    document.getElementById('profile-body-wrap').innerHTML = `
      <div class="profile-body">
        <div class="stats-section">
          <h2>Statistiques <span style="font-size:.75rem;color:var(--gray-3);font-weight:400;font-family:Inter,sans-serif;letter-spacing:0">Saison 2025–26</span></h2>
          <div class="stats-grid">
            <div class="stat-card"><span class="sv">${s.appearances}</span><div class="sl">Matchs</div></div>
            <div class="stat-card"><span class="sv">${s.goals}</span><div class="sl">Buts</div></div>
            <div class="stat-card"><span class="sv">${s.assists}</span><div class="sl">Passes déc.</div></div>
            <div class="stat-card"><span class="sv">${s.rating}</span><div class="sl">Note moy.</div></div>
            ${extraStats}
          </div>
          ${player.bio ? `
            <h2>Biographie</h2>
            <p class="bio-text">${player.bio}</p>
          ` : ''}
        </div>
        <div>
          <div class="sidebar-card">
            <div class="sidebar-card-head">FICHE JOUEUR</div>
            <div class="sidebar-card-body">
              <div class="info-row"><span class="ik">Nom complet</span><span class="iv">${player.name}</span></div>
              <div class="info-row"><span class="ik">Club</span><span class="iv">${player.team}</span></div>
              <div class="info-row"><span class="ik">Poste</span><span class="iv">${player.positionFull}</span></div>
              <div class="info-row"><span class="ik">Nationalité</span><span class="iv">${player.nationality}</span></div>
              <div class="info-row"><span class="ik">Date de naissance</span><span class="iv">${player.dob}</span></div>
              <div class="info-row"><span class="ik">Âge</span><span class="iv">${player.age} ans</span></div>
              <div class="info-row"><span class="ik">Taille</span><span class="iv">${player.height}</span></div>
              <div class="info-row"><span class="ik">Pied fort</span><span class="iv">${player.foot}</span></div>
              <div class="info-row"><span class="ik">Numéro</span><span class="iv">#${player.number}</span></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
